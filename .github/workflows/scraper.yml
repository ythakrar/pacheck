name: Nightly PA Data Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape PA Requirements
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install requests openpyxl beautifulsoup4 psycopg2-binary lxml
      - name: Run scrapers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd scraper && python scheduler.py
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: /tmp/pacheck-scraper-*.log
          retention-days: 30
